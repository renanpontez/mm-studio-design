name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Real Sanity env so CI builds the same prerendered HTML that Vercel will.
    # Public IDs are inline; the read token (private dataset access) comes from
    # the GH Actions secret SANITY_READ_TOKEN. Set with:
    #   printf "<token>" | gh secret set SANITY_READ_TOKEN --repo renanpontez/mm-studio-design
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ca1b6ozb
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: "2024-01-01"
      SANITY_READ_TOKEN: ${{ secrets.SANITY_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build:site
