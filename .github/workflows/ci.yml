name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Sanity env vars are intentionally unset for CI so app/page.tsx renders the
    # "publish in Studio" placeholder (sanityConfigured=false branch) instead of
    # trying to fetch from a dummy project. The real build with content is
    # produced on Vercel where the env vars are configured.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build:site
