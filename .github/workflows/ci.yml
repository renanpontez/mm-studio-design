name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Soft Sanity env so the build can prerender without real creds.
      # The env.ts has a soft guard that warns instead of throwing when these
      # are missing in non-production, so dummy values keep the build quiet.
      NEXT_PUBLIC_SANITY_PROJECT_ID: ci-dummy
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build
